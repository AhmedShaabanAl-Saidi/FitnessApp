<div class="flex justify-end">
  <button
    type="button"
    (click)="changeLanguage()"
    [attr.aria-label]="
      currentLang() === 'en'
        ? 'Switch language to Arabic'
        : 'Switch language to English'
    "
    class="text-white text-sm font-medium cursor-pointer hover:text-[#FF5E00] focus:outline-none transition-colors duration-200"
  >
    {{ currentLang() === 'en' ? 'العربية' : 'English' }}
  </button>
</div>
