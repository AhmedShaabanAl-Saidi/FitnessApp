<section class="relative overflow-hidden py-24">
  <div
    class="absolute inset-0 bg-[url('/images/home/about-us-bg.png')] bg-cover bg-center bg-no-repeat"
  ></div>
  <div class="absolute inset-0 bg-white/95 dark:bg-[#242424F2] backdrop-blur-xl"></div>

  <div class="relative z-10 md:px-20 grid grid-cols-1 lg:grid-cols-2 gap-20 items-center px-6">
    <div class="relative h-190">
      <div class="absolute left-0 top-0 w-[52%] h-[72%] rounded-[28px] overflow-hidden shadow-xl">
        <img src="images/home/trainer-1.png" alt="Trainer" class="w-full h-full object-cover" />
      </div>

      <div
        class="absolute right-[6%] top-[8%] w-[33%] h-[23%] rounded-3xl overflow-hidden shadow-lg"
      >
        <img src="images/home/trainer-3.png" alt="Trainer" class="w-full h-full object-cover" />
      </div>

      <div
        class="absolute left-[34%] bottom-0 w-[48%] h-[56%] rounded-[28px] overflow-hidden shadow-2xl"
      >
        <img src="images/home/trainer-2.png" alt="Trainer" class="w-full h-full object-cover" />
      </div>
    </div>

    <div class="relative">
      <h2
        class="absolute -top-7 md:-top-12 md:left-0 text-[64px] md:text-[82px] font-bold uppercase text-transparent [-webkit-text-stroke:2px_#d8d8d8] opacity-50 pointer-events-none select-none"
      >
        {{ content.sectionTitle }}
      </h2>

      <div
        class="relative top-8 inset-s-5 z-10 flex items-center gap-2 text-primary-brand font-semibold"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M6.5 6.5v11" />
          <path d="M17.5 6.5v11" />
          <path d="M4 9v6" />
          <path d="M20 9v6" />
          <path d="M9 4v16" />
          <path d="M15 4v16" />
          <line x1="9" y1="12" x2="15" y2="12" />
        </svg>

        <span>{{ content.sectionTitle }}</span>
      </div>

      <h1
        class="mt-10 pt-5 text-[40px] dark:text-[#F3F3F4] leading-16 font-bold tracking-tight text-neutral-800"
      >
        {{ content.heading }}
        <br />
        <span class="text-primary-brand">{{ content.highlight }}</span>
        {{ content.headingEnd }}
      </h1>

      <p class="mt-6 max-w-155 text-[17px] leading-8 dark:text-[#F3F3F4] text-neutral-800">
        {{ content.description }}
      </p>

      <div class="mt-14 grid md:grid-cols-2 gap-x-12 dark:text-[#F3F3F4]">
        @for (feature of content.features; track feature.title) {
          <div class="py-8" [class.border-b]="!$last" [class.border-gray-200]="!$last">
            <div class="flex items-center gap-3 mb-4">
              <span class="text-primary-brand text-xl">↗</span>
              <h3 class="text-lg font-bold">{{ feature.title }}</h3>
            </div>

            <p class="leading-8 text-neutral-800 dark:text-[#F3F3F4]">
              {{ feature.description }}
            </p>
          </div>
        }
      </div>

      <div class="mt-4">
        <app-button [showArrow]="true">
          {{ content.buttonText }}
        </app-button>
      </div>
    </div>
  </div>
</section>
