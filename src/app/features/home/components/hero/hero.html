<section
  class="relative overflow-hidden w-full bg-[#F3F3F4] dark:bg-[#3A3A3A] min-h-screen flex flex-col justify-between"
>
  <div
    class="absolute inset-0 bg-[url('/images/home/hero-bg.png')] bg-cover bg-center bg-no-repeat"
  ></div>
  <div class="absolute inset-0 bg-white/60 dark:bg-[#24242499] backdrop-blur-2xl"></div>

  <div
    class="relative z-10 grid grid-cols-1 md:grid-cols-12 w-full px-6 sm:px-12 lg:px-20 pt-25 items-center gap-10 md:gap-6"
  >
    <div class="col-span-1 md:col-span-7 space-y-6 md:space-y-8 order-1">
      <h1
        class="text-3xl sm:text-5xl lg:text-[64px] font-bold text-[#242424] dark:text-[#F3F3F4] uppercase tracking-tight leading-[1.1]"
      >
        {{ content.title.before }}
        <span class="text-primary-brand">{{ content.title.highlight1 }}</span>
        <br class="hidden sm:block" />
        <span class="text-primary-brand">{{ content.title.highlight2 }}</span>
        {{ content.title.after }}
      </h1>

      <div class="border-l-4 border-primary-brand ps-4 max-w-xl">
        <p
          class="text-sm md:text-base text-[#242424] dark:text-[#F3F3F4] font-medium leading-relaxed"
        >
          {{ content.description }}
        </p>
      </div>

      <div class="grid grid-cols-3 gap-2 sm:gap-4 max-w-md pt-2">
        @for (stat of content.stats; track stat.label) {
          <div>
            <h3
              class="text-xl sm:text-2xl md:text-3xl font-bold text-[#242424] dark:text-[#F3F3F4]"
            >
              {{ stat.value }}
            </h3>
            <p
              class="text-[11px] sm:text-xs md:text-sm text-[#242424]/80 dark:text-[#F3F3F4]/80 font-semibold mt-1"
            >
              {{ stat.label }}
            </p>
          </div>
        }
      </div>

      <div class="flex flex-wrap items-center gap-6 pt-2">
        <app-button variant="solid" [showArrow]="true">
          {{ content.buttons.primary }}
        </app-button>

        <app-button variant="outline" [showArrow]="true">
          {{ content.buttons.secondary }}
        </app-button>
      </div>
    </div>

    <div
      class="md:col-span-5 relative flex justify-center md:justify-end order-2 md:order-1 align-bottom h-full items-end pt-5 md:pt-0"
    >
      <img
        src="images/home/hero-trainer.png"
        alt="Gym Athlete"
        class="w-full h-[80dvh] object-contain z-10 drop-shadow-2xl"
      />
    </div>
  </div>

  <app-marquee-tricker [items]="marqueeItems()" />
</section>
