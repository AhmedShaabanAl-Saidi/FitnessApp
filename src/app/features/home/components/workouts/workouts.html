<section class="relative h-screen w-full bg-[#F3F3F4] max-sm:h-auto max-sm:min-h-screen">
  <div
    class="absolute inset-0 w-full h-full bg-center bg-cover bg-no-repeat bg-[url('/images/home/workouts-bg.jpg')]"
  ></div>
  <div class="relative w-full">
    <h2
      class="text-[40px] md:text-[60px] text-center font-bold uppercase text-transparent [-webkit-text-stroke:2px_#d8d8d8] opacity-50 pointer-events-none select-none"
    >
      WorkOuts
    </h2>
    <span
      class="absolute left-1/2 top-1/2 -translate-x-1/2 z-10 flex items-center gap-2 text-primary-brand font-semibold"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M6.5 6.5v11" />
        <path d="M17.5 6.5v11" />
        <path d="M4 9v6" />
        <path d="M20 9v6" />
        <path d="M9 4v16" />
        <path d="M15 4v16" />
        <line x1="9" y1="12" x2="15" y2="12" />
      </svg>

      <span>Fitness Class</span>
    </span>
  </div>
  <div
    class="relative bg-[linear-gradient(to_bottom,#a3a3a3_0_360px,transparent_360px_100%)] pb-6 md:h-100 md:bg-[linear-gradient(to_bottom,#a3a3a3_0_450px,transparent_450px_100%)] md:pb-10"
  >
    <h2
      class="text-2xl py-5 md:text-[40px] 2xl:w-1/3 text-center mx-auto font-bold text-neutral-800"
    >
      Transform Your Body with Our Dynamic <span class="text-primary-brand">Upcoming Workouts</span>
    </h2>
    <app-tabs [tabs]="tabs()" [activeTabId]="selectedTab()" (tabChange)="clickTab($event)" />

    <div class="mx-auto mt-4 flex w-[calc(100%-2rem)] flex-col px-0 md:mt-8 md:w-3/4 md:px-4">
      @if (content()) {
        <app-carousel [items]="carouselItems()" [rows]="1" />
      } @else {
        <div class="text-center py-12 text-neutral-500">
          <p class="animate-pulse">Loading workouts routines...</p>
        </div>
      }
    </div>
  </div>
</section>
