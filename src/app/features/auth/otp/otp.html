<form class="mx-auto w-full max-w-sm space-y-4" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <app-input id="otp-code" type="otp" label="Verification code" autocomplete="one-time-code" formControlName="code"
    [otpLength]="4" [required]="true" [invalid]="showError(form.controls.code)" [errorMessage]="codeError()" />

  <app-button type="submit" [fullWidth]="true" [disabled]="form.invalid">Confirm</app-button>

  <p class="text-center text-xs text-white/60">
    Didn't Receive Verification Code?
    <button type="button" class="font-semibold text-primary-brand hover:underline" (click)="resend()">
      Resend Code
    </button>
  </p>

  <p class="min-h-4 text-center text-xs text-primary-brand" aria-live="polite">
    {{ resendMessage() }}
  </p>
</form>
