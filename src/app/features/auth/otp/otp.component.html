<div class="w-full flex flex-col text-left">
  <!-- Header -->
  <div class="mb-8">
    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight uppercase transition-colors duration-500">
      OTP <span class="text-orange-500">Code</span>
    </h2>
    <p class="text-gray-500 dark:text-gray-400 text-sm mt-1 transition-colors duration-500">Enter the 4-digit code sent to your email.</p>
  </div>

  <!-- Form -->
  <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <!-- 4 Digit Inputs -->
    <div class="flex justify-between gap-3 my-4">
      @for (controlName of ['digit1', 'digit2', 'digit3', 'digit4']; track controlName) {
        <input
          #otpInput
          type="text"
          maxLength="1"
          [formControlName]="controlName"
          (keyup)="onKeyUp($event, $index)"
          (keydown)="onKeyDown($event, $index)"
          class="w-16 h-16 text-center text-2xl font-bold bg-black/[0.02] dark:bg-white/[0.03] border border-black/[0.08] dark:border-white/10 hover:border-black/[0.12] dark:hover:border-white/15 focus:border-orange-500/50 text-gray-800 dark:text-white focus:outline-none focus:ring-1 focus:ring-orange-500/30 transition-all duration-300"
          pattern="[0-9]"
          inputmode="numeric"
        />
      }
    </div>

    @if (otpForm.invalid && otpForm.touched) {
      <div class="text-xs text-red-500 text-center pl-1">
        Please fill in all 4 digits.
      </div>
    }

    <!-- Submit Button -->
    <app-button
      type="submit"
      [disabled]="otpForm.invalid"
      label="Confirm Code"
    ></app-button>
  </form>

  <!-- Footer Resend Link -->
  <div class="mt-8 text-center border-t border-black/[0.06] dark:border-white/5 pt-6 flex flex-col items-center transition-colors duration-500">
    <p class="text-xs text-gray-500 dark:text-gray-400 transition-colors duration-500">
      Didn't receive the OTP code?
    </p>
    <button
      (click)="resendCode()"
      [disabled]="resendTimer > 0"
      class="mt-2 text-sm font-bold text-orange-500 hover:text-orange-400 disabled:text-gray-400 dark:disabled:text-gray-600 transition-colors duration-200 cursor-pointer"
    >
      {{ resendTimer > 0 ? 'Resend in ' + resendTimer + 's' : 'Resend Code' }}
    </button>
  </div>
</div>
