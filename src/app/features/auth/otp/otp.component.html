<div class="w-full flex flex-col text-left">
  <!-- Header Outside Card -->
  <div class="mb-6 text-center">
    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight uppercase transition-colors duration-500">
      OTP CODE
    </h2>
  </div>

  <!-- Card Container -->
  <div class="relative bg-white/75 dark:bg-white/[0.02] backdrop-blur-2xl border border-black/[0.08] dark:border-white/10 rounded-[24px] shadow-xl dark:shadow-2xl p-8 md:p-10 transition-all duration-500 hover:border-black/[0.15] dark:hover:border-white/15">
    
    <!-- Card Internal Title -->
    <div class="mb-6 text-center">
      <h3 class="text-base font-semibold text-gray-500 dark:text-gray-400 tracking-wide transition-colors duration-500">Enter Your OTP-Check Your Email</h3>
    </div>

    <!-- Form -->
    <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- 4 Digit Inputs -->
      <div class="flex justify-between gap-3 my-4">
        @for (controlName of ['digit1', 'digit2', 'digit3', 'digit4']; track controlName) {
          <input
            #otpInput
            type="text"
            maxLength="1"
            [formControlName]="controlName"
            (keyup)="onKeyUp($event, $index)"
            (keydown)="onKeyDown($event, $index)"
            class="w-16 h-16 text-center text-2xl font-bold bg-black/[0.02] dark:bg-white/[0.03] border border-black/[0.08] dark:border-white/10 hover:border-black/[0.12] dark:hover:border-white/15 focus:border-[#FF5E00] rounded-xl text-gray-800 dark:text-white focus:outline-none focus:ring-1 focus:ring-[#FF5E00]/25 transition-all duration-300"
            pattern="[0-9]"
            inputmode="numeric"
          />
        }
      </div>

      @if (otpForm.invalid && otpForm.touched) {
        <div class="text-xs text-red-500 text-center pl-1">
          Please fill in all 4 digits.
        </div>
      }

      <!-- Submit Button -->
      <app-button
        type="submit"
        [disabled]="otpForm.invalid"
        label="Confirm"
      ></app-button>
    </form>

    <!-- Footer Link -->
    <div class="mt-6 text-center border-t border-black/[0.06] dark:border-white/5 pt-5 transition-colors duration-500 flex flex-col items-center">
      <p class="text-xs text-gray-500 dark:text-gray-400 transition-colors duration-500">
        Dont Receive the Password Code?
      </p>
      <a routerLink="/auth/register" class="mt-2 text-sm font-bold text-[#FF5E00] hover:text-[#E05300] transition-colors duration-200 uppercase">
        REGISTER!
      </a>
    </div>
  </div>
</div>
