<div class="w-full flex flex-col text-left">
  <!-- Header -->
  <div class="mb-8">
    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight uppercase transition-colors duration-500">
      WELCOME <span class="text-orange-500">BACK</span>
    </h2>
    <p class="text-gray-500 dark:text-gray-400 text-sm mt-1 transition-colors duration-500">Please enter your credentials to login.</p>
  </div>

  <!-- Form -->
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <!-- Email Input -->
    <div class="flex flex-col space-y-1">
      <app-label for="email">Email</app-label>
      <app-input
        id="email"
        type="email"
        formControlName="email"
        placeholder="name@example.com"
        icon="email"
        [hasError]="isFieldInvalid('email')"
      ></app-input>
      @if (isFieldInvalid('email')) {
        <app-error-message>
          Please enter a valid email address
        </app-error-message>
      }
    </div>

    <!-- Password Input -->
    <div class="flex flex-col space-y-1">
      <div class="flex justify-between items-center pl-1">
        <app-label for="password">Password</app-label>
        <a routerLink="/auth/forgot-password" class="text-xs font-semibold text-orange-500 hover:text-orange-400 transition-colors duration-200 mb-1">
          Forgot Password?
        </a>
      </div>
      <app-input
        id="password"
        type="password"
        formControlName="password"
        placeholder="••••••••"
        icon="lock"
        [hasError]="isFieldInvalid('password')"
      ></app-input>
      @if (isFieldInvalid('password')) {
        <app-error-message>
          Password is required (min 6 characters)
        </app-error-message>
      }
    </div>

    <!-- Remember Me Checkbox -->
    <div class="flex items-center pl-1">
      <label class="relative flex items-center cursor-pointer select-none">
        <input
          type="checkbox"
          formControlName="rememberMe"
          class="sr-only peer"
        />
        <div class="w-5 h-5 bg-black/[0.02] dark:bg-white/[0.03] border border-black/[0.08] dark:border-white/10 rounded-md peer-checked:bg-orange-500 peer-checked:border-orange-600 peer-focus:ring-2 peer-focus:ring-orange-500/30 transition-all duration-200 flex items-center justify-center text-white">
          <svg class="w-3.5 h-3.5 opacity-0 peer-checked:opacity-100 transition-opacity duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <span class="ml-2.5 text-xs text-gray-500 dark:text-gray-400 font-semibold hover:text-gray-700 dark:hover:text-gray-300 transition-colors duration-200">
          Remember me
        </span>
      </label>
    </div>

    <!-- Submit Button -->
    <app-button
      type="submit"
      [disabled]="loginForm.invalid"
      label="Sign In"
    ></app-button>
  </form>

  <!-- Footer Link -->
  <div class="mt-8 text-center border-t border-black/[0.06] dark:border-white/5 pt-6 transition-colors duration-500">
    <p class="text-xs text-gray-500 dark:text-gray-400 transition-colors duration-500">
      Don't have an account?
      <a routerLink="/auth/register" class="text-orange-500 hover:text-orange-400 font-bold ml-1 transition-colors duration-200">
        Create Account
      </a>
    </p>
  </div>
</div>
