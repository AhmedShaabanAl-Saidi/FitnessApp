<div class="w-full flex flex-col text-center">
  <!-- Header Outside Card -->
  <div class="mb-6">
    <p class="text-sm italic text-gray-400 mb-1">Hey There</p>
    <h2 class="text-3xl font-extrabold text-white tracking-tight uppercase">
      WELCOME BACK
    </h2>
  </div>

  <!-- Card Container -->
  <div class="relative bg-gradient-to-b from-white/[0.08] to-transparent border border-dashed border-white/20 rounded-[20px] p-8 md:p-10">
    
    <!-- Card Internal Title -->
    <div class="mb-6 text-center">
      <h3 class="text-lg font-bold text-white">Login</h3>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      
      <!-- Email Input -->
      <lib-text-input
        id="email"
        type="email"
        [(value)]="email"
        [touched]="emailTouched()"
        [error]="emailError()"
        (onBlur)="emailTouched.set(true)"
        placeholder="Email"
        icon="mail"
      ></lib-text-input>

      <!-- Password Input -->
      <div class="flex flex-col">
        <lib-text-input
          id="password"
          type="password"
          [(value)]="password"
          [touched]="passwordTouched()"
          [error]="passwordError()"
          (onBlur)="passwordTouched.set(true)"
          placeholder="Password"
          icon="lock"
        ></lib-text-input>
        <div class="text-right mt-1">
          <a routerLink="/auth/forgot-password" class="text-xs font-semibold text-[#FF5E00] hover:text-[#FF7A33] transition-colors duration-200">
            Forget Password ?
          </a>
        </div>
      </div>

      <!-- Divider -->
      <div class="flex items-center py-1 select-none">
        <div class="flex-grow border-t border-white/10"></div>
        <span class="px-4 text-xs text-gray-500 tracking-wider">Or</span>
        <div class="flex-grow border-t border-white/10"></div>
      </div>

      <!-- Social Logins -->
      <div class="flex items-center justify-center space-x-6 pb-2">
        <!-- Facebook -->
        <button type="button" class="text-white text-lg font-bold hover:text-gray-300 transition-colors duration-200 cursor-pointer select-none">
          f
        </button>
        <!-- Google -->
        <button type="button" class="text-white text-lg font-bold hover:text-gray-300 transition-colors duration-200 cursor-pointer select-none">
          G
        </button>
        <!-- Apple -->
        <button type="button" class="text-white hover:text-gray-300 transition-colors duration-200 cursor-pointer select-none">
          <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.49-.62.71-1.16 1.85-1.01 2.96 1.07.08 2.2-.55 2.94-1.39z"/>
          </svg>
        </button>
      </div>

      <!-- Submit Button -->
      <app-button
        type="submit"
        [disabled]="!isFormValid()"
        label="Login"
      ></app-button>
    </form>

    <!-- Footer Link -->
    <div class="mt-6 text-center">
      <p class="text-xs text-gray-400">
        Dont Have An Account Yet ?
        <a routerLink="/auth/register" class="text-[#FF5E00] hover:text-[#FF7A33] font-bold ml-1 transition-colors duration-200">
          Register
        </a>
      </p>
    </div>
  </div>
</div>
