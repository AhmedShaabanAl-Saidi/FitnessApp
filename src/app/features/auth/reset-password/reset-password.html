<form class="mx-auto w-full max-w-sm space-y-3" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <app-input id="new-password" type="password" placeholder="Password" autocomplete="new-password"
    leadingIcon="pi pi-lock" formControlName="password" [required]="true" [invalid]="showError(form.controls.password)"
    [errorMessage]="passwordError()" />

  <app-input id="confirm-password" type="password" placeholder="Re-enter Password" autocomplete="new-password"
    leadingIcon="pi pi-lock" formControlName="confirmation" [required]="true" [invalid]="confirmationInvalid()"
    [errorMessage]="confirmationError()" />

  <app-button type="submit" [fullWidth]="true" [disabled]="form.invalid">Done</app-button>
</form>
