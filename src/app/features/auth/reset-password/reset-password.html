<div class="mx-auto w-full max-w-sm space-y-3">
  <app-input id="new-password" type="password" placeholder="Password" autocomplete="new-password"
    leadingIcon="pi pi-lock" [readonly]="true" />

  <app-input id="confirm-password" type="password" placeholder="Re-enter Password" autocomplete="new-password"
    leadingIcon="pi pi-lock" [readonly]="true" />

  <app-button routerLink="/auth/login" [fullWidth]="true">Done</app-button>
</div>
