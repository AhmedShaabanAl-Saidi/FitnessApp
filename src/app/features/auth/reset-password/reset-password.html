<form class="mx-auto w-full max-w-sm space-y-3" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <app-input id="new-password" type="password" [placeholder]="'AUTH.COMMON.PASSWORD' | translate"
    autocomplete="new-password" leadingIcon="pi pi-lock" formControlName="password" [required]="true"
    [invalid]="showError(form.controls.password)" [errorMessage]="passwordError() | translate" />

  <app-input id="confirm-password" type="password" [placeholder]="'AUTH.COMMON.REENTER_PASSWORD' | translate"
    autocomplete="new-password" leadingIcon="pi pi-lock" formControlName="confirmation" [required]="true"
    [invalid]="confirmationInvalid()" [errorMessage]="confirmationError() | translate" />

  <app-button type="submit" [fullWidth]="true" [disabled]="form.invalid">
    {{ 'AUTH.COMMON.DONE' | translate }}
  </app-button>
</form>
