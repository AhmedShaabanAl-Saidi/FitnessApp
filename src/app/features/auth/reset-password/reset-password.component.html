<div class="w-full flex flex-col text-left">
  <!-- Header Outside Card -->
  <div class="mb-6 text-center">
    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight mt-1 transition-colors duration-500">
      Create New Password
    </h2>
  </div>

  <!-- Card Container -->
  <div class="relative bg-white/75 dark:bg-white/[0.02] backdrop-blur-2xl border border-black/[0.08] dark:border-white/10 rounded-[24px] shadow-xl dark:shadow-2xl p-8 md:p-10 transition-all duration-500 hover:border-black/[0.15] dark:hover:border-white/15">
    
    <!-- Card Internal Title / Subtitle -->
    <div class="mb-8 text-center">
      <h3 class="text-sm font-semibold text-gray-900 dark:text-white tracking-wide transition-colors duration-500">Make Sure Its 8 Characters Or More</h3>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      
      <!-- Password Input -->
      <div class="flex flex-col space-y-1">
        <app-input
          id="password"
          type="password"
          [formField]="resetForm.password"
          placeholder="Password"
          icon="lock"
          [hasError]="isFieldInvalid(resetForm.password)"
        ></app-input>
        @if (isFieldInvalid(resetForm.password)) {
          <app-error-message>
            Password must be at least 6 characters
          </app-error-message>
        }
      </div>

      <!-- Confirm Password Input -->
      <div class="flex flex-col space-y-1">
        <app-input
          id="confirmPassword"
          type="password"
          [formField]="resetForm.confirmPassword"
          placeholder="Confirm Password"
          icon="lock"
          [hasError]="isConfirmPasswordInvalid()"
        ></app-input>
        @if (isConfirmPasswordInvalid()) {
          <app-error-message>
            Passwords do not match
          </app-error-message>
        }
      </div>

      <!-- Submit Button -->
      <div class="pt-4">
        <app-button
          type="submit"
          [disabled]="resetForm().invalid() || !passwordsMatch()"
          label="Done"
        ></app-button>
      </div>
    </form>
  </div>
</div>
