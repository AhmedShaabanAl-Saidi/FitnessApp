<form class="mx-auto w-full max-w-sm space-y-4" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <app-input id="forgot-email" type="email" [placeholder]="'AUTH.COMMON.EMAIL' | translate" autocomplete="email"
    inputMode="email" leadingIcon="pi pi-envelope" formControlName="email" [required]="true"
    [invalid]="showError(form.controls.email)" [errorMessage]="emailError() | translate" />

  <app-button type="submit" [fullWidth]="true" [disabled]="form.invalid">
    {{ 'AUTH.COMMON.SEND_OTP' | translate }}
  </app-button>
</form>
