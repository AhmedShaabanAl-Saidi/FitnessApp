<form class="mx-auto w-full max-w-sm space-y-4" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <app-input id="forgot-email" type="email" placeholder="Email" autocomplete="email" inputMode="email"
    leadingIcon="pi pi-envelope" formControlName="email" [required]="true" [invalid]="showError(form.controls.email)"
    [errorMessage]="emailError()" />

  <app-button type="submit" [fullWidth]="true" [disabled]="form.invalid">Send OTP</app-button>
</form>
