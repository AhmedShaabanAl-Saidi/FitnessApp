<div class="w-full flex flex-col text-left">
  <!-- Header Outside Card -->
  <div class="mb-6 text-center">
    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight uppercase transition-colors duration-500">
      Forget Password
    </h2>
  </div>

  <!-- Card Container -->
  <div class="relative bg-white/75 dark:bg-white/[0.02] backdrop-blur-2xl border border-black/[0.08] dark:border-white/10 rounded-[24px] shadow-xl dark:shadow-2xl p-8 md:p-10 transition-all duration-500 hover:border-black/[0.15] dark:hover:border-white/15">
    
    <!-- Card Internal Title -->
    <div class="mb-6 text-center">
      <h3 class="text-xl font-bold text-gray-900 dark:text-white tracking-wide transition-colors duration-500">Enter Your Email</h3>
    </div>

    <!-- Form -->
    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Email Input -->
      <div class="flex flex-col space-y-1">
        <app-input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Your Email"
          icon="email"
          [hasError]="isFieldInvalid('email')"
        ></app-input>
        @if (isFieldInvalid('email')) {
          <app-error-message>
            Please enter a valid email address
          </app-error-message>
        }
      </div>

      <!-- Submit Button -->
      <app-button
        type="submit"
        [disabled]="forgotForm.invalid"
        label="Send OTP"
      ></app-button>
    </form>

    <!-- Footer Link -->
    <div class="mt-8 text-center border-t border-black/[0.06] dark:border-white/5 pt-6 transition-colors duration-500">
      <a routerLink="/auth/login" class="text-xs text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-white transition-colors duration-200 flex items-center justify-center font-semibold">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Back to Login
      </a>
    </div>
  </div>
</div>
