<div class="w-full flex flex-col text-left">
  <!-- Header Outside Card -->
  <div class="mb-6 text-center">
    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight mt-1 transition-colors duration-500">
      Forget Password
    </h2>
  </div>

  <!-- Card Container -->
  <div class="relative bg-white/75 dark:bg-white/[0.02] backdrop-blur-2xl border border-black/[0.08] dark:border-white/10 rounded-[24px] shadow-xl dark:shadow-2xl p-8 md:p-10 transition-all duration-500 hover:border-black/[0.15] dark:hover:border-white/15">
    
    <!-- Card Internal Title / Subtitle -->
    <div class="mb-8 text-center">
      <h3 class="text-sm font-semibold text-gray-900 dark:text-white tracking-wide transition-colors duration-500">Enter Your Email</h3>
    </div>

    <!-- Form -->
    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-4">
      
      <!-- Email Input -->
      <div class="flex flex-col space-y-1">
        <app-input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Email"
          icon="email"
          [hasError]="isFieldInvalid('email')"
        ></app-input>
        @if (isFieldInvalid('email')) {
          <app-error-message>
            Please enter a valid email address
          </app-error-message>
        }
      </div>

      <!-- Submit Button -->
      <div class="pt-4">
        <app-button
          type="submit"
          [disabled]="forgotForm.invalid"
          label="Sent OTP"
        ></app-button>
      </div>
    </form>
  </div>
</div>
