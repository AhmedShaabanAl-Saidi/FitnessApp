<form class="mx-auto w-full max-w-sm space-y-3" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <app-input id="register-first-name" [placeholder]="'AUTH.COMMON.FIRST_NAME' | translate" autocomplete="given-name"
    leadingIcon="pi pi-user" formControlName="firstName" [required]="true"
    [invalid]="showError(form.controls.firstName)" [errorMessage]="firstNameError() | translate" />

  <app-input id="register-last-name" [placeholder]="'AUTH.COMMON.LAST_NAME' | translate" autocomplete="family-name"
    leadingIcon="pi pi-user" formControlName="lastName" [required]="true" [invalid]="showError(form.controls.lastName)"
    [errorMessage]="lastNameError() | translate" />

  <app-input id="register-email" type="email" [placeholder]="'AUTH.COMMON.EMAIL' | translate" autocomplete="email"
    inputMode="email" leadingIcon="pi pi-envelope" formControlName="email" [required]="true"
    [invalid]="showError(form.controls.email)" [errorMessage]="emailError() | translate" />

  <app-input id="register-password" type="password" [placeholder]="'AUTH.COMMON.PASSWORD' | translate"
    autocomplete="new-password" leadingIcon="pi pi-lock" formControlName="password" [required]="true"
    [invalid]="showError(form.controls.password)" [errorMessage]="passwordError() | translate" />

  <div class="text-end">
    <a routerLink="/auth/forgot-password"
      class="text-xs font-semibold text-primary-brand underline-offset-2 hover:underline">
      {{ 'AUTH.REGISTER.FORGOT_PASSWORD' | translate }}
    </a>
  </div>

  <app-auth-social-login />

  <app-button type="submit" [fullWidth]="true" [disabled]="form.invalid">
    {{ 'AUTH.COMMON.REGISTER' | translate }}
  </app-button>

  <p class="text-center text-xs text-white/65">
    {{ 'AUTH.REGISTER.ALREADY_HAVE_ACCOUNT' | translate }}
    <a routerLink="/auth/login" class="font-semibold text-primary-brand hover:underline">
      {{ 'AUTH.REGISTER.LOGIN_LINK' | translate }}
    </a>
  </p>
</form>
