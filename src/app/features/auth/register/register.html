<form class="mx-auto w-full max-w-sm space-y-3" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <app-input id="register-first-name" placeholder="First Name" autocomplete="given-name" leadingIcon="pi pi-user"
    formControlName="firstName" [required]="true" [invalid]="showError(form.controls.firstName)"
    [errorMessage]="nameError(form.controls.firstName, 'First name')" />

  <app-input id="register-last-name" placeholder="Last Name" autocomplete="family-name" leadingIcon="pi pi-user"
    formControlName="lastName" [required]="true" [invalid]="showError(form.controls.lastName)"
    [errorMessage]="nameError(form.controls.lastName, 'Last name')" />

  <app-input id="register-email" type="email" placeholder="Email" autocomplete="email" inputMode="email"
    leadingIcon="pi pi-envelope" formControlName="email" [required]="true" [invalid]="showError(form.controls.email)"
    [errorMessage]="emailError()" />

  <app-input id="register-password" type="password" placeholder="Password" autocomplete="new-password"
    leadingIcon="pi pi-lock" formControlName="password" [required]="true" [invalid]="showError(form.controls.password)"
    [errorMessage]="passwordError()" />

  <div class="text-end">
    <a routerLink="/auth/forgot-password"
      class="text-xs font-semibold text-primary-brand underline-offset-2 hover:underline">
      Forget Password?
    </a>
  </div>

  <app-auth-social-login />

  <app-button type="submit" [fullWidth]="true" [disabled]="form.invalid">Register</app-button>

  <p class="text-center text-xs text-white/65">
    Already Have An Account?
    <a routerLink="/auth/login" class="font-semibold text-primary-brand hover:underline">Login</a>
  </p>
</form>
