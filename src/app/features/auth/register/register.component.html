<div class="w-full flex flex-col text-left">
  <!-- Header Outside Card -->
  <div class="mb-6 text-center">
    <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold tracking-widest transition-colors duration-500">Hey There</p>
    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight mt-1 transition-colors duration-500">
      Create An Account
    </h2>
  </div>

  <!-- Card Container -->
  <div class="relative bg-white/75 dark:bg-white/[0.02] backdrop-blur-2xl border border-black/[0.08] dark:border-white/10 rounded-[24px] shadow-xl dark:shadow-2xl p-8 md:p-10 transition-all duration-500 hover:border-black/[0.15] dark:hover:border-white/15">
    
    <!-- Card Internal Title -->
    <div class="mb-6 text-center">
      <h3 class="text-xl font-bold text-gray-900 dark:text-white tracking-wide transition-colors duration-500">Register</h3>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <!-- First Name Input -->
      <div class="flex flex-col space-y-1">
        <lib-text-input
          id="firstName"
          type="text"
          [(value)]="firstName"
          [touched]="firstNameTouched()"
          [error]="firstNameError()"
          (onBlur)="firstNameTouched.set(true)"
          placeholder="First Name"
          icon="user"
        ></lib-text-input>
      </div>

      <!-- Last Name Input -->
      <div class="flex flex-col space-y-1">
        <lib-text-input
          id="lastName"
          type="text"
          [(value)]="lastName"
          [touched]="lastNameTouched()"
          [error]="lastNameError()"
          (onBlur)="lastNameTouched.set(true)"
          placeholder="Last Name"
          icon="user"
        ></lib-text-input>
      </div>

      <!-- Email Input -->
      <div class="flex flex-col space-y-1">
        <lib-text-input
          id="email"
          type="email"
          [(value)]="email"
          [touched]="emailTouched()"
          [error]="emailError()"
          (onBlur)="emailTouched.set(true)"
          placeholder="Email"
          icon="mail"
        ></lib-text-input>
      </div>

      <!-- Password Input -->
      <div class="flex flex-col space-y-1">
        <lib-text-input
          id="password"
          type="password"
          [(value)]="password"
          [touched]="passwordTouched()"
          [error]="passwordError()"
          (onBlur)="passwordTouched.set(true)"
          placeholder="Password"
          icon="lock"
        ></lib-text-input>
        <div class="text-right px-1 pt-1">
          <a routerLink="/auth/forgot-password" class="text-xs font-semibold text-[#FF5E00] hover:text-[#E05300] transition-colors duration-200">
            Forget Password ?
          </a>
        </div>
      </div>

      <!-- Divider -->
      <div class="flex items-center py-2 select-none">
        <div class="flex-grow border-t border-black/[0.06] dark:border-white/10"></div>
        <span class="px-3 text-xs text-gray-400 dark:text-gray-500 uppercase tracking-widest font-semibold">Or</span>
        <div class="flex-grow border-t border-black/[0.06] dark:border-white/10"></div>
      </div>

      <!-- Social Logins -->
      <div class="flex items-center justify-center space-x-4 pb-2">
        <!-- Facebook -->
        <button type="button" class="w-10 h-10 rounded-full bg-black/[0.02] dark:bg-white/[0.05] hover:bg-black/[0.05] dark:hover:bg-white/10 flex items-center justify-center text-gray-700 dark:text-white border border-black/[0.08] dark:border-white/10 transition-all duration-200 cursor-pointer select-none">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.8c4.56-.93 8-4.96 8-9.8z"/>
          </svg>
        </button>
        <!-- Google -->
        <button type="button" class="w-10 h-10 rounded-full bg-black/[0.02] dark:bg-white/[0.05] hover:bg-black/[0.05] dark:hover:bg-white/10 flex items-center justify-center text-gray-700 dark:text-white border border-black/[0.08] dark:border-white/10 transition-all duration-200 cursor-pointer select-none">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-10.986 0-.742-.08-1.31-.175-1.874H12.24z"/>
          </svg>
        </button>
        <!-- Apple -->
        <button type="button" class="w-10 h-10 rounded-full bg-black/[0.02] dark:bg-white/[0.05] hover:bg-black/[0.05] dark:hover:bg-white/10 flex items-center justify-center text-gray-700 dark:text-white border border-black/[0.08] dark:border-white/10 transition-all duration-200 cursor-pointer select-none">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.49-.62.71-1.16 1.85-1.01 2.96 1.07.08 2.2-.55 2.94-1.39z"/>
          </svg>
        </button>
      </div>

      <!-- Submit Button -->
      <app-button
        type="submit"
        [disabled]="!isFormValid()"
        label="Register"
      ></app-button>
    </form>

    <!-- Footer Link -->
    <div class="mt-6 text-center pt-1 transition-colors duration-500">
      <p class="text-xs text-gray-500 dark:text-gray-400 transition-colors duration-500">
        Already Have An Account ?
        <a routerLink="/auth/login" class="text-[#FF5E00] hover:text-[#E05300] font-bold ml-1 transition-colors duration-200">
          Login
        </a>
      </p>
    </div>
  </div>
</div>
