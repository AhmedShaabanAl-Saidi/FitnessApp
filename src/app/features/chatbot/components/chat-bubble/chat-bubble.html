<!-- AI Message -->
@if (message.role === 'model') {
  <div class="flex items-start gap-2.5 w-full justify-start animate-fade-in">
    <p-avatar
      image="images/chatbot/Chatbot.png"
      shape="circle"
      styleClass="border border-primary-brand bg-neutral-900 shadow-sm shrink-0 !w-8 !h-8"
    />
    <app-message-card [role]="message.role" [text]="message.text" [timestamp]="message.timestamp" />
  </div>
}

<!-- User Message -->
@if (message.role === 'user') {
  <div class="flex items-start gap-2.5 w-full justify-end animate-fade-in">
    <app-message-card [role]="message.role" [text]="message.text" [timestamp]="message.timestamp" />
    <p-avatar
      icon="pi pi-user"
      shape="circle"
      styleClass="bg-neutral-800 border border-white/10 text-white shrink-0 !w-8 !h-8"
    />
  </div>
}
