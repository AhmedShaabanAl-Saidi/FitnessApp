<button [type]="type()" [disabled]="unavailable()" [attr.aria-busy]="loading() ? 'true' : null"
  [class]="buttonClasses()" (click)="handleClick($event)">
  @if (loading()) {
  <i class="pi pi-spinner pi-spin" aria-hidden="true"></i>
  <span class="sr-only">Loading</span>
  }

  <span [class.opacity-70]="loading()">
    <ng-content></ng-content>
  </span>

  @if (displayArrow()) {
  <span aria-hidden="true" [class]="arrowClasses()">
    <i class="pi pi-arrow-up-right"></i>
  </span>
  }
</button>
