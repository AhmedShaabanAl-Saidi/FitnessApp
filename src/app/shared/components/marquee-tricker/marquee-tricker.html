<div
  class="w-full overflow-hidden bg-primary-brand z-20 absolute bottom-0 inset-x-0 py-3 md:py-4 text-white uppercase font-bold tracking-wider select-none"
>
  <div class="flex whitespace-nowrap animate-marquee">
    <div
      class="flex shrink-0 min-w-full gap-4 text-sm md:text-2xl items-center justify-around pr-4"
    >
      @for (item of items(); track $index) {
        <span>{{ item }}</span>
        <span class="text-xl">✦</span>
      }
    </div>

    <div
      class="flex shrink-0 min-w-full gap-4 text-sm md:text-2xl items-center justify-around pr-4"
      aria-hidden="true"
    >
      @for (item of items(); track $index) {
        <span>{{ item }}</span>
        <span class="text-xl">✦</span>
      }
    </div>
  </div>
</div>
