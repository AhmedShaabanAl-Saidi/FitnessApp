<div class="w-full flex flex-col">
  @if (label()) {
  <label [for]="inputId()" class="text-sm font-medium text-gray-300 mb-1 ml-1">
    {{ label() }}
  </label>
  }

  <div class="relative w-full flex items-center group">
    @if (icon()) {
    <div class="absolute left-4 flex items-center justify-center text-gray-400 group-focus-within:text-gray-200 pointer-events-none transition-colors duration-200">
      <i-lucide [name]="icon()" size="18"></i-lucide>
    </div>
    }

    <input
      [id]="inputId()"
      [type]="
        type() === 'password' ? (showPassword() ? 'text' : 'password') : type()
      "
      [placeholder]="placeholder()"
      [value]="value() || ''"
      [disabled]="disabled()"
      [attr.aria-describedby]="describedBy"
      [attr.aria-invalid]="Invalid"
      (blur)="onBlur.emit()"
      (input)="value.set($any($event.target).value)"
      class="w-full h-[48px] bg-transparent border rounded-[14px] outline-none transition-all duration-200 text-sm text-white placeholder:text-gray-500"
      [ngClass]="{
        'border-white/20 focus:border-[#FF5E00] focus:ring-1 focus:ring-[#FF5E00]/30': !Invalid,
        'border-red-500 focus:border-red-500 focus:ring-1 focus:ring-red-500/30': Invalid,
        'pl-11': icon(),
        'pl-4': !icon(),
        'pr-11': type() === 'password',
        'pr-4': type() !== 'password',
        'opacity-50 cursor-not-allowed': disabled()
      }"
    />

    @if (type() === 'password') {
    <button
      type="button"
      (click)="togglePassword()"
      [attr.aria-controls]="inputId()"
      [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
      [attr.aria-pressed]="showPassword()"
      class="absolute right-4 flex items-center justify-center text-gray-400 hover:text-white transition-colors duration-200 cursor-pointer focus:outline-none"
    >
      <i-lucide
        [name]="showPassword() ? 'eye' : 'eye-off'"
        size="18"
      ></i-lucide>
    </button>
    }
  </div>

  <lib-input-error
    [error]="error()"
    [touched]="touched()"
    [customType]="type()"
    [errorId]="errorId()"
  ></lib-input-error>
</div>
