<nav
  class="fixed top-0 left-0 w-full z-50 md:px-20 md:py-4 px-4.5 py-2 flex items-center justify-between transition-all duration-300 text-neutral-800 dark:text-neutral-100"
  [class.bg-transparent]="!isScrolled()"
  [class.bg-neutral-100]="isScrolled()"
  [class.dark:bg-neutral-900]="isScrolled()"
  [class.shadow-lg]="isScrolled()"
>
  <div class="flex items-center">
    <img src="images/logo.png" alt="Super Fitness Logo" class="h-13.75 w-auto" />
  </div>

  <ul class="hidden md:flex items-center gap-6 font-bold text-neutral-800 dark:text-neutral-100">
    @for (item of navItems; track item.link) {
      <li>
        <a
          [routerLink]="item.link"
          routerLinkActive="text-primary-brand"
          [routerLinkActiveOptions]="{ exact: true }"
          class="transition-colors duration-200 hover:text-primary-brand"
        >
          {{ item.label | translate }}
        </a>
      </li>
    }
  </ul>

  <div class="hidden md:flex items-center gap-5">
    <app-button variant="solid" [showArrow]="true" routerLink="/auth/login">
      {{ 'NAVBAR.LOGIN' | translate }}
    </app-button>
    <app-button variant="outline" [showArrow]="true" routerLink="/auth/register">
      {{ 'NAVBAR.SIGN_UP' | translate }}
    </app-button>
  </div>

  <div class="flex md:hidden items-center gap-3">
    <p-button
      routerLink="/profile"
      icon="pi pi-user"
      [rounded]="true"
      severity="danger"
      styleClass="bg-primary-brand border-none w-10 h-10"
    />

    <p-button
      icon="pi pi-bars"
      [rounded]="true"
      severity="danger"
      styleClass="bg-primary-brand border-none w-10 h-10"
      (onClick)="toggleMobileMenu()"
    />
  </div>
</nav>

<p-drawer
  [(visible)]="mobileMenuVisible"
  position="left"
  styleClass="w-72 !bg-white dark:!bg-neutral-900 !text-neutral-900 dark:!text-white !border-r !border-neutral-200 dark:!border-neutral-700"
>
  <ng-template #header>
    <div class="flex items-center py-2">
      <img src="images/logo.png" alt="Super Fitness Logo" class="h-15 w-auto" />
    </div>
  </ng-template>

  <div class="flex flex-col gap-6 font-semibold text-lg px-2">
    @for (item of navItems; track item.link) {
      <a
        [routerLink]="item.link"
        (click)="mobileMenuVisible.set(false)"
        routerLinkActive="text-primary-brand"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-neutral-800 dark:text-neutral-100 hover:text-primary-brand transition-colors duration-200"
      >
        {{ item.label | translate }}
      </a>
    }
  </div>
</p-drawer>
